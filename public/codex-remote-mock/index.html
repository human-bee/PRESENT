<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Remote Codex Mock</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "IBM Plex Sans", "Avenir Next", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(95, 175, 255, 0.22), transparent 36%),
          radial-gradient(circle at bottom right, rgba(255, 146, 82, 0.18), transparent 32%),
          linear-gradient(180deg, #08111d 0%, #04070b 100%);
        color: #edf3fb;
      }

      main {
        width: min(88vw, 720px);
        padding: 28px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(7, 12, 18, 0.84);
        box-shadow: 0 32px 120px rgba(0, 0, 0, 0.36);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: #84c8ff;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 5vw, 46px);
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: rgba(237, 243, 251, 0.78);
      }

      code {
        display: inline-block;
        margin-top: 18px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(132, 200, 255, 0.1);
        color: #b9ddff;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Brokered Remote Surface</div>
      <h1>Remote Codex Mock</h1>
      <p>This is the stand-in remote app server surface used by reset-shell end-to-end verification.</p>
      <code id="mock-path">loading...</code>
    </main>
    <script>
      const target = document.getElementById('mock-path');
      if (target) {
        target.textContent = `path: ${window.location.pathname}`;
      }
    </script>
  </body>
  </html>
